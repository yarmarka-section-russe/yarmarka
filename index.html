<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЯРМАРКА — Commande</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Rubik:wght@300;400;500&display=swap');

  :root {
    --rouge: #C0392B;
    --or: #D4AF37;
    --noir: #1a1008;
    --creme: #F5ECD7;
    --vert: #2E7D32;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--noir);
    color: var(--creme);
    font-family: 'Rubik', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(192,57,43,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(212,175,55,0.06) 0%, transparent 50%);
  }

  header {
    text-align: center;
    padding: 40px 20px 20px;
    border-bottom: 1px solid rgba(212,175,55,0.2);
  }
  header::before {
    content: '✦';
    display: block;
    color: var(--or);
    font-size: 14px;
    letter-spacing: 8px;
    margin-bottom: 8px;
    opacity: 0.6;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 8vw, 3.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--or) 0%, #F5C842 50%, var(--or) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.05em;
  }
  header p {
    font-size: 0.85rem;
    color: rgba(245,236,215,0.5);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .stepper {
    display: flex;
    justify-content: center;
    padding: 28px 20px 0;
    max-width: 500px;
    margin: 0 auto;
  }
  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    position: relative;
  }
  .step:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 14px; left: 50%;
    width: 100%; height: 1px;
    background: rgba(212,175,55,0.2);
  }
  .step-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(212,175,55,0.3);
    background: var(--noir);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: rgba(245,236,215,0.4);
    z-index: 1;
    transition: all 0.4s;
  }
  .step.active .step-dot { background: var(--or); border-color: var(--or); color: var(--noir); font-weight: 700; box-shadow: 0 0 16px rgba(212,175,55,0.4); }
  .step.done .step-dot   { background: var(--vert); border-color: var(--vert); color: white; }
  .step-label { font-size: 10px; color: rgba(245,236,215,0.35); margin-top: 6px; text-align: center; }
  .step.active .step-label { color: var(--or); }

  .page { display: none; animation: fadeUp 0.4s ease; }
  .page.active { display: block; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform:translateY(0); } }

  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }
  @media (min-width: 768px) {
    .container { max-width: 720px; padding: 36px 32px 80px; }
    header { padding: 50px 40px 24px; }
  }
  @media (min-width: 1024px) {
    .container { max-width: 960px; }
    #product-list { grid-template-columns: repeat(2, 1fr) !important; }
    #page-info .container, #page-qr .container { max-width: 580px; }
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 3vw, 1.6rem);
    color: var(--or);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(212,175,55,0.2); }

  /* ── PRODUITS ── */
  #product-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  @media (min-width: 600px) { #product-list { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 1024px) { #product-list { grid-template-columns: repeat(3, 1fr); } }

  .product-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(212,175,55,0.15);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.25s, transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
  }
  .product-card:hover {
    border-color: rgba(212,175,55,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .product-card.out-of-stock { opacity: 0.45; pointer-events: none; }

  /* Photo du produit */
  .product-photo {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
    background: rgba(255,255,255,0.04);
  }
  .product-photo-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(212,175,55,0.05);
    font-size: 2.5rem;
    color: rgba(212,175,55,0.2);
  }

  .product-body {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }
  .product-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .product-info { flex: 1; min-width: 0; }
  .product-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--creme);
    line-height: 1.3;
  }
  .product-desc {
    font-size: 0.78rem;
    color: rgba(245,236,215,0.45);
    margin-top: 3px;
    line-height: 1.4;
  }
  .product-price {
    font-weight: 600;
    color: var(--or);
    font-size: 1.05rem;
    white-space: nowrap;
  }
  .out-badge {
    font-size: 0.68rem;
    background: rgba(192,57,43,0.25);
    color: #e57373;
    border: 1px solid rgba(192,57,43,0.4);
    border-radius: 20px;
    padding: 2px 8px;
    align-self: center;
  }
  .qty-control { display: flex; align-items: center; gap: 10px; justify-content: flex-end; }
  .qty-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid rgba(212,175,55,0.4);
    background: transparent;
    color: var(--or);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .qty-btn:hover { background: rgba(212,175,55,0.15); border-color: var(--or); }
  .qty-num { min-width: 22px; text-align: center; font-weight: 600; font-size: 1rem; color: var(--creme); }

  /* ── PANIER ── */
  #cart-summary {
    display: none;
    margin-top: 24px;
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 12px;
    padding: 16px;
    background: rgba(212,175,55,0.04);
  }
  .cart-row { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 4px 0; color: rgba(245,236,215,0.8); }
  .cart-total {
    border-top: 1px solid rgba(212,175,55,0.2);
    margin-top: 10px; padding-top: 10px;
    display: flex; justify-content: space-between;
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem; color: var(--or);
  }

  /* ── FORMULAIRE ── */
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(245,236,215,0.5); margin-bottom: 8px; }
  input, select {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(212,175,55,0.2);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--creme);
    font-family: 'Rubik', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.25s;
    -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--or); }
  select option { background: #2a1f0e; color: var(--creme); }

  /* ── BOUTONS ── */
  .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-family: 'Rubik', sans-serif; font-size: 1rem; font-weight: 500; cursor: pointer; letter-spacing: 0.05em; transition: all 0.25s; }
  .btn-primary {
    background: linear-gradient(135deg, var(--rouge), #9b2218);
    color: white; margin-top: 8px;
    position: relative; overflow: hidden;
  }
  .btn-primary::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); transition: left 0.5s; }
  .btn-primary:hover::after { left: 100%; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(192,57,43,0.35); }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
  .btn-ghost { background: transparent; border: 1px solid rgba(212,175,55,0.3); color: var(--or); margin-top: 12px; }
  .btn-ghost:hover { border-color: var(--or); background: rgba(212,175,55,0.08); }
  .btn-row { display: flex; gap: 12px; margin-top: 8px; }
  .btn-row .btn { margin-top: 0; }

  /* ── QR CODE ── */
  #page-qr { text-align: center; }
  .qr-wrapper { background: white; display: inline-block; border-radius: 16px; padding: 20px; margin: 24px auto; box-shadow: 0 0 60px rgba(212,175,55,0.2); }
  .order-num { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 2.8rem); color: var(--or); letter-spacing: 0.1em; }
  .qr-info { background: rgba(255,255,255,0.04); border: 1px solid rgba(212,175,55,0.15); border-radius: 12px; padding: 18px; margin-top: 20px; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto; }
  .qr-info-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 0.9rem; color: rgba(245,236,215,0.75); border-bottom: 1px solid rgba(212,175,55,0.08); }
  .qr-info-row:last-child { border-bottom: none; }
  .qr-info-row strong { color: var(--creme); }
  .pickup-timer { font-family: 'Playfair Display', serif; font-size: clamp(1.5rem, 4vw, 2rem); color: var(--or); margin-top: 20px; }
  .pickup-timer span { font-size: 0.85rem; font-family: 'Rubik', sans-serif; color: rgba(245,236,215,0.5); display: block; margin-top: 4px; }
  .pulse-ring { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--vert); margin-right: 8px; animation: pulse 1.8s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(46,125,50,0.6); } 70% { box-shadow: 0 0 0 10px rgba(46,125,50,0); } 100% { box-shadow: 0 0 0 0 rgba(46,125,50,0); } }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: rgba(30,20,10,0.95); border: 1px solid rgba(212,175,55,0.3); color: var(--creme); padding: 12px 24px; border-radius: 30px; font-size: 0.9rem; transition: transform 0.35s ease; z-index: 999; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-cart { text-align: center; padding: 30px 20px; color: rgba(245,236,215,0.3); font-size: 0.9rem; }
</style>
</head>
<body>

<header>
  <h1>ЯРМАРКА</h1>
  <p>Commande en ligne · Retrait rapide</p>
</header>

<div class="stepper">
  <div class="step active" id="s1"><div class="step-dot">1</div><div class="step-label">Panier</div></div>
  <div class="step" id="s2"><div class="step-dot">2</div><div class="step-label">Infos</div></div>
  <div class="step" id="s3"><div class="step-dot">3</div><div class="step-label">QR Code</div></div>
</div>

<!-- PAGE 1 : PRODUITS -->
<div class="page active" id="page-products">
  <div class="container">
    <div class="section-title">Notre menu</div>
    <div id="product-list"><div class="empty-cart">Chargement des produits…</div></div>
    <div id="cart-summary">
      <div id="cart-rows"></div>
      <div class="cart-total"><span>Total</span><span id="cart-total-val">0,00 €</span></div>
    </div>
    <button class="btn btn-primary" id="btn-to-info" disabled onclick="goToInfo()">Continuer →</button>
  </div>
</div>

<!-- PAGE 2 : INFOS CLIENT -->
<div class="page" id="page-info">
  <div class="container">
    <div class="section-title">Vos informations</div>
    <div class="form-group">
      <label>Votre prénom</label>
      <input type="text" id="inp-name" placeholder="ex : Ivan" autocomplete="given-name">
    </div>
    <div class="form-group">
      <label>Numéro de téléphone</label>
      <input type="tel" id="inp-phone" placeholder="ex : 06 12 34 56 78" autocomplete="tel">
    </div>
    <div class="form-group">
      <label>Heure de retrait souhaitée</label>
      <select id="inp-time"></select>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="goBack()">← Modifier</button>
      <button class="btn btn-primary" id="btn-confirm" onclick="confirmOrder()" style="margin-top:0;">Valider ma commande</button>
    </div>
  </div>
</div>

<!-- PAGE 3 : QR CODE -->
<div class="page" id="page-qr">
  <div class="container">
    <div class="section-title" style="justify-content:center;text-align:center;">Commande confirmée !</div>
    <p style="text-align:center;color:rgba(245,236,215,0.5);font-size:0.85rem;margin-top:-10px;">
      <span class="pulse-ring"></span>Commande en attente de préparation
    </p>
    <div style="text-align:center;">
      <div class="order-num" id="qr-order-num">#000</div>
      <div class="qr-wrapper"><div id="qrcode"></div></div>
    </div>
    <div class="pickup-timer" id="pickup-display" style="text-align:center;">— <span>heure de retrait</span></div>
    <div class="qr-info" id="qr-summary"></div>
    <p style="text-align:center;margin-top:24px;font-size:0.8rem;color:rgba(245,236,215,0.35);line-height:1.6;">
      Présentez ce QR code lors du retrait.<br>Le paiement se fait sur place.
    </p>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://bdrhgheeppcmwzjkvyyb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkcmhnaGVlcHBjbXd6amt2eXliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MTE0ODYsImV4cCI6MjA5NjM4NzQ4Nn0.V6iV34Vr0AGPlvU886cjeDty-i8qJpwVHsCRjBvnlZg';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let products = [];
let cart = {};

window.onload = async () => {
  populateTimePicker();
  await loadProducts();
};

async function loadProducts() {
  const { data, error } = await db.from('products').select('*').order('name');
  if (error) { showToast('Erreur de chargement'); return; }
  products = data;
  renderProducts();
}

function getPhotoUrl(photoPath) {
  if (!photoPath) return null;
  const { data } = db.storage.from('product-photos').getPublicUrl(photoPath);
  return data.publicUrl;
}

function renderProducts() {
  const list = document.getElementById('product-list');
  if (!products.length) {
    list.innerHTML = '<div class="empty-cart">Aucun produit disponible pour l\'instant.</div>';
    return;
  }
  list.innerHTML = products.map(p => {
    const photoUrl = getPhotoUrl(p.photo_path);
    const photoHtml = photoUrl
      ? `<img class="product-photo" src="${photoUrl}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\'product-photo-placeholder\'>🍽</div>'">`
      : `<div class="product-photo-placeholder">🍽</div>`;

    return `
    <div class="product-card ${p.in_stock ? '' : 'out-of-stock'}" id="card-${p.id}">
      ${photoHtml}
      <div class="product-body">
        <div class="product-top">
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            ${p.description ? `<div class="product-desc">${p.description}</div>` : ''}
          </div>
          <div class="product-price">${p.price.toFixed(2).replace('.',',')} €</div>
        </div>
        ${p.in_stock
          ? `<div class="qty-control">
              <button class="qty-btn" onclick="changeQty('${p.id}',-1)">−</button>
              <span class="qty-num" id="qty-${p.id}">0</span>
              <button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button>
            </div>`
          : `<div class="out-badge">Plus en stock</div>`
        }
      </div>
    </div>`;
  }).join('');
}

function changeQty(id, delta) {
  if (!cart[id]) cart[id] = 0;
  cart[id] = Math.max(0, cart[id] + delta);
  document.getElementById('qty-' + id).textContent = cart[id];
  updateCartSummary();
}

function updateCartSummary() {
  const items = Object.entries(cart).filter(([,q]) => q > 0);
  const summary = document.getElementById('cart-summary');
  const rows = document.getElementById('cart-rows');
  const totalEl = document.getElementById('cart-total-val');
  const btn = document.getElementById('btn-to-info');
  if (!items.length) { summary.style.display = 'none'; btn.disabled = true; return; }
  let total = 0;
  rows.innerHTML = items.map(([id, qty]) => {
    const p = products.find(x => x.id === id);
    const sub = p.price * qty;
    total += sub;
    return `<div class="cart-row"><span>${p.name} × ${qty}</span><span>${sub.toFixed(2).replace('.',',')} €</span></div>`;
  }).join('');
  totalEl.textContent = total.toFixed(2).replace('.',',') + ' €';
  summary.style.display = 'block';
  btn.disabled = false;
}

function populateTimePicker() {
  const sel = document.getElementById('inp-time');
  const now = new Date();
  const slots = [];
  for (let i = 2; i <= 40; i++) {
    const d = new Date(now.getTime() + i * 5 * 60000);
    slots.push(d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0'));
  }
  sel.innerHTML = slots.map(s => `<option value="${s}">${s}</option>`).join('');
}

function goToInfo() { setStep(2); showPage('page-info'); }
function goBack()   { setStep(1); showPage('page-products'); }
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function setStep(n) {
  [1,2,3].forEach(i => {
    const el = document.getElementById('s'+i);
    el.classList.remove('active','done');
    if (i < n) el.classList.add('done');
    if (i === n) el.classList.add('active');
  });
}

async function confirmOrder() {
  const name  = document.getElementById('inp-name').value.trim();
  const phone = document.getElementById('inp-phone').value.trim();
  const time  = document.getElementById('inp-time').value;
  if (!name)  { showToast('Merci d\'entrer votre prénom'); return; }
  if (!phone) { showToast('Merci d\'entrer votre numéro'); return; }
  const items = Object.entries(cart).filter(([,q]) => q > 0).map(([id, qty]) => {
    const p = products.find(x => x.id === id);
    return { id, name: p.name, price: p.price, qty };
  });
  const total = items.reduce((acc, i) => acc + i.price * i.qty, 0);
  const orderNum = Math.floor(100 + Math.random() * 900);
  const btn = document.getElementById('btn-confirm');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Envoi…';
  const { data, error } = await db.from('orders').insert({
    order_num: orderNum, customer_name: name, customer_phone: phone,
    pickup_time: time, items, total, status: 'pending'
  }).select().single();
  if (error) { showToast('Erreur : ' + error.message); btn.disabled = false; btn.textContent = 'Valider ma commande'; return; }
  showQR(data, items, total);
}

function showQR(order, items, total) {
  setStep(3); showPage('page-qr');
  document.getElementById('qr-order-num').textContent = '#' + order.order_num;
  document.getElementById('pickup-display').innerHTML = `${order.pickup_time} <span>heure de retrait</span>`;
  document.getElementById('qr-summary').innerHTML =
    items.map(i => `<div class="qr-info-row"><span>${i.name} × ${i.qty}</span><strong>${(i.price*i.qty).toFixed(2).replace('.',',')} €</strong></div>`).join('') +
    `<div class="qr-info-row" style="margin-top:8px;"><span>À payer</span><strong style="color:var(--or);font-size:1.1rem">${total.toFixed(2).replace('.',',')} €</strong></div>`;
  document.getElementById('qrcode').innerHTML = '';
  new QRCode(document.getElementById('qrcode'), { text: order.id, width: 200, height: 200, colorDark: '#1a1008', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
